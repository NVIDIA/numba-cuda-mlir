on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read
  id-token: write

jobs:
  build-llvm-modern:
    name: LLVM Modern (${{ matrix.py-tag }})
    if: ${{ startsWith(inputs.host-platform, 'linux') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - { python-dir: cp310-cp310, py-tag: cp310 }
          - { python-dir: cp311-cp311, py-tag: cp311 }
          - { python-dir: cp312-cp312, py-tag: cp312 }
          - { python-dir: cp313-cp313, py-tag: cp313 }
          - { python-dir: cp314-cp314, py-tag: cp314 }
          - { python-dir: cp314-cp314t, py-tag: cp314t }
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') }}
    timeout-minutes: 180
    container:
      image: ${{ (inputs.host-platform == 'linux-aarch64' && 'quay.io/pypa/manylinux_2_28_aarch64') ||
                  'quay.io/pypa/manylinux_2_28_x86_64' }}
    env:
      PY: /opt/python/${{ matrix.python-dir }}/bin/python
      PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute cache key
        id: cache-key
        run: |
          KEY="$(bash ci/llvm-cache-key.sh modern "${{ inputs.host-platform }}" "${{ matrix.py-tag }}")"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore or check LLVM Modern GHA cache
        id: gha-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm-modern-install/
          key: ${{ steps.cache-key.outputs.key }}
          lookup-only: ${{ github.ref_name != 'main' }}

      - name: Install build dependencies
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          "${PY}" -m pip install pybind11 nanobind numpy ninja cmake awscli "typing-extensions; python_version < '3.12'"
          chmod +x ci/*.sh

      - name: Install sccache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          sccache --version

      - name: Set up sccache S3 credentials
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          ci/setup-sccache.sh

      - name: Build or restore LLVM Modern from cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          source ci/llvm-version.env
          CACHE_KEY="${{ steps.cache-key.outputs.key }}"
          echo "Cache key: ${CACHE_KEY}"
          if source ci/llvm-cache.sh && cache_download "$CACHE_KEY" llvm-modern-install; then
            echo "Using cached LLVM"
          else
            ci/build-llvm-modern.sh
            source ci/llvm-cache.sh && cache_upload "$CACHE_KEY" llvm-modern-install
          fi

      - name: Save LLVM Modern to GHA cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm-modern-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Upload LLVM Modern artifacts
        if: github.ref_name == 'main' || steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm-modern-install-${{ matrix.py-tag }}-${{ inputs.host-platform }}
          path: llvm-modern-install/

  build-llvm-modern-windows:
    name: LLVM Modern Windows (${{ matrix.py-tag }})
    if: ${{ inputs.host-platform == 'win-64' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.11", py-tag: cp311 }
          - { python-version: "3.12", py-tag: cp312 }
          - { python-version: "3.13", py-tag: cp313 }
          - { python-version: "3.14", py-tag: cp314 }
          - { python-version: "3.14t", py-tag: cp314t }
    runs-on: windows-amd64-cpu16
    timeout-minutes: 120
    env:
      PARALLEL: "16"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute cache key
        id: cache-key
        run: |
          KEY="$(bash ci/llvm-cache-key.sh modern "${{ inputs.host-platform }}" "${{ matrix.py-tag }}")"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore or check LLVM Modern GHA cache
        id: gha-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm-modern-install/
          key: ${{ steps.cache-key.outputs.key }}
          lookup-only: ${{ github.ref_name != 'main' }}

      - name: Pull devcontainer image
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Get-Content ci/windows-devcontainer.env | ForEach-Object {
            if ($_ -match '^\s*([A-Za-z_][A-Za-z0-9_]*)=(.*)\s*$') {
              Set-Item -Path "Env:$($Matches[1])" -Value $Matches[2].Trim()
            }
          }
          docker pull $env:WINDOWS_DEVCONTAINER_IMAGE

      - name: Build modern LLVM in devcontainer
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          Get-Content ci/windows-devcontainer.env | ForEach-Object {
            if ($_ -match '^\s*([A-Za-z_][A-Za-z0-9_]*)=(.*)\s*$') {
              Set-Item -Path "Env:$($Matches[1])" -Value $Matches[2].Trim()
            }
          }
          $src = (Resolve-Path "${{ github.workspace }}").Path
          $img = $env:WINDOWS_DEVCONTAINER_IMAGE
          $py = $env:PYTHON_VERSION
          $cname = "llvm-modern-${{ matrix.py-tag }}"
          docker run --name $cname --isolation=process `
            --mount "type=bind,source=$src,target=C:\workspace" `
            --workdir C:\workspace `
            --env "PARALLEL=${{ env.PARALLEL }}" `
            $img `
            powershell -NoProfile -ExecutionPolicy Bypass -File C:\workspace\ci\windows-llvm-container-build.ps1 -PythonVersion $py -Mode modern
          if ($LASTEXITCODE -ne 0) {
            throw "Modern LLVM build container failed with exit code $LASTEXITCODE"
          }

      - name: Verify LLVM Modern install and remove container
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $cname = "llvm-modern-${{ matrix.py-tag }}"
          $install = "${{ github.workspace }}\llvm-modern-install"
          if (-not (Test-Path $install)) {
            throw "LLVM Modern install not found at $install"
          }
          docker rm $cname

      - name: Save LLVM Modern to GHA cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm-modern-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Upload LLVM Modern artifacts
        if: github.ref_name == 'main' || steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm-modern-install-${{ matrix.py-tag }}-${{ inputs.host-platform }}
          path: llvm-modern-install/

  build-llvm7:
    name: LLVM 7
    if: ${{ startsWith(inputs.host-platform, 'linux') }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') }}
    timeout-minutes: 180
    container:
      image: ${{ (inputs.host-platform == 'linux-aarch64' && 'quay.io/pypa/manylinux_2_28_aarch64') ||
                  'quay.io/pypa/manylinux_2_28_x86_64' }}
    env:
      PY: /opt/python/cp312-cp312/bin/python
      PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute cache key
        id: cache-key
        run: |
          KEY="$(bash ci/llvm-cache-key.sh llvm7 "${{ inputs.host-platform }}")"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore or check LLVM 7 GHA cache
        id: gha-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm7-install/
          key: ${{ steps.cache-key.outputs.key }}
          lookup-only: ${{ github.ref_name != 'main' }}

      - name: Install build dependencies
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          "${PY}" -m pip install pybind11 nanobind numpy ninja cmake awscli
          chmod +x ci/*.sh

      - name: Install sccache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          sccache --version

      - name: Set up sccache S3 credentials
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          ci/setup-sccache.sh

      - name: Build or restore LLVM 7 from cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          source ci/llvm-version.env
          CACHE_KEY="${{ steps.cache-key.outputs.key }}"
          echo "Cache key: ${CACHE_KEY}"
          if source ci/llvm-cache.sh && cache_download "$CACHE_KEY" llvm7-install; then
            echo "Using cached LLVM 7"
          else
            ci/build-llvm7.sh
            source ci/llvm-cache.sh && cache_upload "$CACHE_KEY" llvm7-install
          fi

      - name: Save LLVM 7 to GHA cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm7-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Upload LLVM 7 artifacts
        if: github.ref_name == 'main' || steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm7-install-${{ inputs.host-platform }}
          path: llvm7-install/

  build-llvm7-windows:
    name: LLVM 7 Windows
    if: ${{ inputs.host-platform == 'win-64' }}
    runs-on: windows-amd64-cpu16
    timeout-minutes: 120
    env:
      PARALLEL: "16"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute cache key
        id: cache-key
        run: |
          KEY="$(bash ci/llvm-cache-key.sh llvm7 "${{ inputs.host-platform }}")"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore or check LLVM 7 GHA cache
        id: gha-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm7-install/
          key: ${{ steps.cache-key.outputs.key }}
          lookup-only: ${{ github.ref_name != 'main' }}

      - name: Pull devcontainer image
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Get-Content ci/windows-devcontainer.env | ForEach-Object {
            if ($_ -match '^\s*([A-Za-z_][A-Za-z0-9_]*)=(.*)\s*$') {
              Set-Item -Path "Env:$($Matches[1])" -Value $Matches[2].Trim()
            }
          }
          docker pull $env:WINDOWS_DEVCONTAINER_IMAGE

      - name: Build LLVM 7 in devcontainer
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Get-Content ci/windows-devcontainer.env | ForEach-Object {
            if ($_ -match '^\s*([A-Za-z_][A-Za-z0-9_]*)=(.*)\s*$') {
              Set-Item -Path "Env:$($Matches[1])" -Value $Matches[2].Trim()
            }
          }
          $src = (Resolve-Path "${{ github.workspace }}").Path
          $img = $env:WINDOWS_DEVCONTAINER_IMAGE
          docker run --name llvm7-build --isolation=process `
            --mount "type=bind,source=$src,target=C:\workspace" `
            --workdir C:\workspace `
            --env "PARALLEL=${{ env.PARALLEL }}" `
            $img `
            powershell -NoProfile -ExecutionPolicy Bypass -File C:\workspace\ci\windows-llvm-container-build.ps1 -PythonVersion 3.12 -Mode llvm7
          if ($LASTEXITCODE -ne 0) {
            throw "LLVM 7 build container failed with exit code $LASTEXITCODE"
          }

      - name: Verify LLVM 7 install and remove container
        if: steps.gha-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $install = "${{ github.workspace }}\llvm7-install"
          if (-not (Test-Path $install)) {
            throw "LLVM 7 install not found at $install"
          }
          docker rm llvm7-build

      - name: Save LLVM 7 to GHA cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm7-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Upload LLVM 7 artifacts
        if: github.ref_name == 'main' || steps.gha-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm7-install-${{ inputs.host-platform }}
          path: llvm7-install/
