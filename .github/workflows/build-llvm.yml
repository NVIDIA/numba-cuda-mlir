on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read
  id-token: write

jobs:
  build-llvm-modern:
    name: LLVM Modern (${{ matrix.py-tag }})
    if: ${{ startsWith(inputs.host-platform, 'linux') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - { python-dir: cp310-cp310, py-tag: cp310 }
          - { python-dir: cp311-cp311, py-tag: cp311 }
          - { python-dir: cp312-cp312, py-tag: cp312 }
          - { python-dir: cp313-cp313, py-tag: cp313 }
          - { python-dir: cp314-cp314, py-tag: cp314 }
          - { python-dir: cp314-cp314t, py-tag: cp314t }
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') }}
    timeout-minutes: 180
    container:
      image: ${{ (inputs.host-platform == 'linux-aarch64' && 'quay.io/pypa/manylinux_2_28_aarch64') ||
                  'quay.io/pypa/manylinux_2_28_x86_64' }}
    env:
      PY: /opt/python/${{ matrix.python-dir }}/bin/python
      PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute cache key
        id: cache-key
        run: |
          source ci/llvm-version.env
          SCRIPT_HASH=$(sha256sum ci/build-llvm-modern.sh | cut -c1-12)
          VERSION_SHORT=$(echo "$LLVM_MODERN_COMMIT" | cut -c1-12)
          ARCH=$(uname -m)
          PY_TAG="${{ matrix.py-tag }}"
          KEY="llvm-modern-linux-${ARCH}-${PY_TAG}-${VERSION_SHORT}-${SCRIPT_HASH}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore LLVM Modern from GHA cache
        id: gha-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm-modern-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install build dependencies
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          "${PY}" -m pip install pybind11 nanobind numpy ninja cmake awscli "typing-extensions; python_version < '3.12'"
          chmod +x ci/*.sh

      - name: Install sccache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          sccache --version

      - name: Set up sccache S3 credentials
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          ci/setup-sccache.sh

      - name: Build or restore LLVM Modern from cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          source ci/llvm-version.env
          CACHE_KEY="${{ steps.cache-key.outputs.key }}"
          echo "Cache key: ${CACHE_KEY}"
          if source ci/llvm-cache.sh && cache_download "$CACHE_KEY" llvm-modern-install; then
            echo "Using cached LLVM"
          else
            ci/build-llvm-modern.sh
            source ci/llvm-cache.sh && cache_upload "$CACHE_KEY" llvm-modern-install
          fi

      - name: Upload LLVM Modern artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm-modern-install-${{ matrix.py-tag }}-${{ inputs.host-platform }}
          path: llvm-modern-install/

  build-llvm-modern-windows:
    name: LLVM Modern Windows (${{ matrix.py-tag }})
    if: ${{ inputs.host-platform == 'win-64' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.11", py-tag: cp311 }
          # - { python-version: "3.12", py-tag: cp312 }
          # - { python-version: "3.13", py-tag: cp313 }
          # - { python-version: "3.14", py-tag: cp314 }
          # - { python-version: "3.14t", py-tag: cp314t }
    runs-on: windows-2022-4core
    timeout-minutes: 300
    env:
      PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1

      - name: Compute cache key
        id: cache-key
        run: |
          source ci/llvm-version.env
          SCRIPT_HASH=$(sha256sum ci/build-windows.sh | cut -c1-12)
          VERSION_SHORT=$(echo "$LLVM_MODERN_COMMIT" | cut -c1-12)
          KEY="llvm-modern-windows-amd64-${{ matrix.py-tag }}-${VERSION_SHORT}-${SCRIPT_HASH}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore LLVM Modern from GHA cache
        id: gha-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm-modern-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install build dependencies
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install pybind11 nanobind numpy ninja cmake awscli "typing-extensions; python_version < '3.12'"
          chmod +x ci/*.sh

      - name: Build modern LLVM with MLIR
        if: steps.gha-cache.outputs.cache-hit != 'true'
        env:
          PYTHON: python
        run: ci/build-windows.sh modern

      - name: Upload LLVM Modern artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm-modern-install-${{ matrix.py-tag }}-${{ inputs.host-platform }}
          path: llvm-modern-install/

  build-llvm7:
    name: LLVM 7
    if: ${{ startsWith(inputs.host-platform, 'linux') }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') }}
    timeout-minutes: 180
    container:
      image: ${{ (inputs.host-platform == 'linux-aarch64' && 'quay.io/pypa/manylinux_2_28_aarch64') ||
                  'quay.io/pypa/manylinux_2_28_x86_64' }}
    env:
      PY: /opt/python/cp312-cp312/bin/python
      PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Compute cache key
        id: cache-key
        run: |
          source ci/llvm-version.env
          SCRIPT_HASH=$(sha256sum ci/build-llvm7.sh | cut -c1-12)
          VERSION_SHORT=$(echo "$LLVM7_TAG" | cut -c1-12)
          ARCH=$(uname -m)
          KEY="llvm7-linux-${ARCH}-${VERSION_SHORT}-${SCRIPT_HASH}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore LLVM 7 from GHA cache
        id: gha-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm7-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install build dependencies
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          "${PY}" -m pip install pybind11 nanobind numpy ninja cmake awscli
          chmod +x ci/*.sh

      - name: Install sccache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          sccache --version

      - name: Set up sccache S3 credentials
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          ci/setup-sccache.sh

      - name: Build or restore LLVM 7 from cache
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(dirname $PY):$PATH"
          source ci/llvm-version.env
          CACHE_KEY="${{ steps.cache-key.outputs.key }}"
          echo "Cache key: ${CACHE_KEY}"
          if source ci/llvm-cache.sh && cache_download "$CACHE_KEY" llvm7-install; then
            echo "Using cached LLVM 7"
          else
            ci/build-llvm7.sh
            source ci/llvm-cache.sh && cache_upload "$CACHE_KEY" llvm7-install
          fi

      - name: Upload LLVM 7 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm7-install-${{ inputs.host-platform }}
          path: llvm7-install/

  build-llvm7-windows:
    name: LLVM 7 Windows
    if: ${{ inputs.host-platform == 'win-64' }}
    runs-on: windows-2022-4core
    timeout-minutes: 300
    env:
      PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 43200

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1

      - name: Compute cache key
        id: cache-key
        run: |
          source ci/llvm-version.env
          SCRIPT_HASH=$(sha256sum ci/build-windows.sh | cut -c1-12)
          VERSION_SHORT=$(echo "$LLVM7_TAG" | cut -c1-12)
          KEY="llvm7-windows-amd64-${VERSION_SHORT}-${SCRIPT_HASH}"
          echo "key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore LLVM 7 from GHA cache
        id: gha-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm7-install/
          key: ${{ steps.cache-key.outputs.key }}

      - name: Install build dependencies
        if: steps.gha-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install ninja cmake awscli
          chmod +x ci/*.sh

      - name: Build LLVM 7
        if: steps.gha-cache.outputs.cache-hit != 'true'
        env:
          PYTHON: python
        run: ci/build-windows.sh llvm7

      - name: Upload LLVM 7 artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: llvm7-install-${{ inputs.host-platform }}
          path: llvm7-install/
