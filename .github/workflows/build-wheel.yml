on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string
      cuda-version:
        required: true
        type: string
      prev-cuda-version:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read  # This is required for actions/checkout

jobs:
  build:
    if: ${{ startsWith(inputs.host-platform, 'linux') }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          # TODO: Re-enable 3.10/3.11 after fixing PEP 695 type parameter syntax
          # (def func[T](...)) to be compatible with Python < 3.12.
          # - "3.10"
          # - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
    name: py${{ matrix.python-version }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install latest rapidsai/sccache
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | sudo tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          sccache --version
          echo "SCCACHE_PATH=/usr/local/bin/sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_USE_PREPROCESSOR_CACHE_MODE=true" >> "$GITHUB_ENV"

      # xref: https://github.com/orgs/community/discussions/42856#discussioncomment-7678867
      - name: Adding addtional GHA cache-related env vars
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_SERVICE_V2', 'on');
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'] || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'] || '');

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        with:
          enable-apt: true

      - name: Set environment variables
        env:
          HOST_PLATFORM: ${{ inputs.host-platform }}
          PY_VER: ${{ matrix.python-version }}
          SHA: ${{ github.sha }}
        run: ./ci/tools/env-vars build

      - name: Dump environment
        run: |
          env

      - name: Determine cibuildwheel and LLVM Python tags
        id: wheel-tags
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          PY_VER_FMT=$(echo "${{ matrix.python-version }}" | tr -d '.')
          echo "llvm-py-tag=cp${PY_VER_FMT}" >> "$GITHUB_OUTPUT"
          echo "cibw-build=cp${PY_VER_FMT}-manylinux*" >> "$GITHUB_OUTPUT"

      - name: Download LLVM Modern artifacts
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: llvm-modern-install-${{ steps.wheel-tags.outputs.llvm-py-tag }}-${{ inputs.host-platform }}
          path: llvm-modern-install

      - name: Download LLVM 7 artifacts
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: llvm7-install-${{ inputs.host-platform }}
          path: llvm7-install

      - name: Fix LLVM artifact permissions
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          chmod -R +x llvm-modern-install/bin/ llvm7-install/bin/ || true
          chmod -R +x llvm-modern-install/lib/ llvm7-install/lib/ || true

      - name: Build cuda-lang-numba-compat wheel (Linux)
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084  # v3.4.1
        with:
          package-dir: .
          output-dir: ${{ env.CL_NUMBA_COMPAT_CUDA_ARTIFACTS_DIR }}
        env:
          CIBW_BUILD: ${{ steps.wheel-tags.outputs.cibw-build }}
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64
          CIBW_MANYLINUX_AARCH64_IMAGE: quay.io/pypa/manylinux_2_28_aarch64
          CIBW_ENVIRONMENT_LINUX: >
            MLIR_DIR=/host/${{ github.workspace }}/llvm-modern-install/lib/cmake/mlir
            LIBLLVM7=/host/${{ github.workspace }}/llvm7-install/lib/libLLVM-7.so
            CC="/host/${{ env.SCCACHE_PATH }} cc"
            CXX="/host/${{ env.SCCACHE_PATH }} c++"
            SCCACHE_GHA_ENABLED=true
            ACTIONS_RUNTIME_TOKEN=${{ env.ACTIONS_RUNTIME_TOKEN }}
            ACTIONS_RUNTIME_URL=${{ env.ACTIONS_RUNTIME_URL }}
            ACTIONS_RESULTS_URL=${{ env.ACTIONS_RESULTS_URL }}
            ACTIONS_CACHE_URL=${{ env.ACTIONS_CACHE_URL }}
            ACTIONS_CACHE_SERVICE_V2=${{ env.ACTIONS_CACHE_SERVICE_V2 }}
            SCCACHE_GHA_USE_PREPROCESSOR_CACHE_MODE=${{ env.SCCACHE_GHA_USE_PREPROCESSOR_CACHE_MODE }}
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel -v repair {wheel} --wheel-dir {dest_dir}
            --exclude libMLIRPythonCAPI.so
            --exclude libMLIRPythonSupport-cusimt.so
            --exclude libLLVM-7.so &&
            "/host/${{ env.SCCACHE_PATH }}" --show-adv-stats &&
            "/host/${{ env.SCCACHE_PATH }}" --show-stats --stats-format=json > /host/${{ github.workspace }}/sccache_cl_numba_compat.json

      - name: Report sccache stats (cuda-lang-numba-compat)
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        uses: ./.github/actions/sccache-summary
        with:
          json-file: sccache_cl_numba_compat.json
          label: "cuda-lang-numba-compat"
          build-step: "Build cuda-lang-numba-compat wheel (Linux)"

      - name: List the cuda-lang-numba-compat artifacts directory
        run: |
          ls -lahR dist/

      - name: Upload cuda-lang-numba-compat build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.CL_NUMBA_COMPAT_CUDA_ARTIFACT_NAME }}
          path: dist/*.whl
          if-no-files-found: error

  build-tests:
    needs:
      - build
    if: ${{ startsWith(inputs.host-platform, 'linux') }}
    strategy:
      fail-fast: false
      matrix:
        # We just need 1 Python version because the artifacts are Python agnostic.
        python-version:
          - "3.12"
        cuda-version:
          - "12.2.2"
          - ${{ inputs.cuda-version }}
          - ${{ inputs.prev-cuda-version }}
    name: py${{ matrix.python-version }} CUDA ${{ matrix.cuda-version }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install latest rapidsai/sccache
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | sudo tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          echo "SCCACHE_PATH=/usr/local/bin/sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_USE_PREPROCESSOR_CACHE_MODE=true" >> "$GITHUB_ENV"

      # xref: https://github.com/orgs/community/discussions/42856#discussioncomment-7678867
      - name: Adding addtional GHA cache-related env vars
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_SERVICE_V2', 'on');
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'] || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'] || '');

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        with:
          enable-apt: true

      - name: Install GCC 12 for CUDA 12.2
        if: ${{ matrix.cuda-version == '12.2.2' }}
        uses: ./.github/actions/install_unix_deps
        continue-on-error: false
        with:
          dependencies: "gcc-12 g++-12"
          dependent_exes: "gcc-12 g++-12"

      - name: Patch glibc aarch64 vector math declarations for CUDA 12.2
        if: ${{ inputs.host-platform == 'linux-aarch64' && matrix.cuda-version == '12.2.2' }}
        run: |
          sudo python3 - <<'PY'
          from pathlib import Path

          path = Path("/usr/include/aarch64-linux-gnu/bits/math-vector.h")
          text = path.read_text()
          replacements = {
              "#if __GNUC_PREREQ(9, 0)": "#if __GNUC_PREREQ(9, 0) && !defined(__CUDACC__)",
              "#elif __glibc_clang_prereq(8, 0)": "#elif __glibc_clang_prereq(8, 0) && !defined(__CUDACC__)",
              "#if __GNUC_PREREQ(10, 0) || __glibc_clang_prereq(11, 0)": "#if (__GNUC_PREREQ(10, 0) || __glibc_clang_prereq(11, 0)) && !defined(__CUDACC__)",
          }
          for old, new in replacements.items():
              if old not in text and new not in text:
                  raise SystemExit(f"Expected pattern not found in {path}: {old}")
              text = text.replace(old, new)
          path.write_text(text)
          PY

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set environment variables
        env:
          HOST_PLATFORM: ${{ inputs.host-platform }}
          PY_VER: ${{ matrix.python-version }}
          SHA: ${{ github.sha }}
        run: |
          ./ci/tools/env-vars build
          CUDA_MAJOR="$(cut -d '.' -f 1 <<< ${{ matrix.cuda-version }})"
          CUDA_MINOR="$(cut -d '.' -f 2 <<< ${{ matrix.cuda-version }})"
          echo "CUDA_MAJOR=${CUDA_MAJOR}" >> "${GITHUB_ENV}"
          echo "CUDA_MINOR=${CUDA_MINOR}" >> "${GITHUB_ENV}"
          CUDA_ARTIFACT_SUFFIX="cu${CUDA_MAJOR}"
          if [[ "${CUDA_MAJOR}.${CUDA_MINOR}" == "12.2" ]]; then
            CUDA_ARTIFACT_SUFFIX="cu${CUDA_MAJOR}${CUDA_MINOR}"
          fi
          echo "CUDA_ARTIFACT_SUFFIX=${CUDA_ARTIFACT_SUFFIX}" >> "${GITHUB_ENV}"

      - name: Dump environment
        run: |
          env

      - name: Download cuda-lang-numba-compat build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ env.CL_NUMBA_COMPAT_CUDA_ARTIFACT_NAME }}
          path: ${{ env.CL_NUMBA_COMPAT_CUDA_ARTIFACTS_DIR }}

      - name: Display structure of downloaded cuda-lang-numba-compat artifacts
        run: |
          pwd
          ls -lahR "${CL_NUMBA_COMPAT_CUDA_ARTIFACTS_DIR}"

      - name: Install cuda-lang-numba-compat
        run: |
          CUDA_BINDINGS_SPEC="cuda-bindings==${CUDA_MAJOR}.${CUDA_MINOR}.*"
          if [[ "${CUDA_MAJOR}.${CUDA_MINOR}" == "12.2" ]]; then
            CUDA_BINDINGS_SPEC="cuda-bindings>=12.9.1,<13.0.0"
          fi
          python -m pip install "${CL_NUMBA_COMPAT_CUDA_ARTIFACTS_DIR}"/*.whl "${CUDA_BINDINGS_SPEC}"

      - name: Set up mini CTK ${{ matrix.cuda-version }}
        uses: ./.github/actions/fetch_ctk
        continue-on-error: false
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: ${{ matrix.cuda-version }}
          cuda-components: "cuda_nvcc,cuda_cudart,cuda_crt,libnvvm,cuda_nvrtc,cuda_cccl,libnvjitlink,cuda_cuobjdump"

      - name: Build cuda-lang-numba-compat test artifacts against CUDA ${{ matrix.cuda-version }}
        run: |
          pushd tests/numba_cuda_tests/testing
          if [[ "${{ inputs.host-platform }}" == linux* ]]; then
            export PATH="$(dirname "${SCCACHE_PATH}"):${PATH}"
            export SCCACHE_GHA_ENABLED=true
          fi

          nvcc --version

          if [[ "${CUDA_MAJOR}" == 12 ]]; then
            CC_LIST=(70 75 80 86 89 90)
            if [[ "${CUDA_MINOR}" -ge 8 ]]; then
              CC_LIST+=(120)
            fi
          elif [[ "${CUDA_MAJOR}" == 13 ]]; then
            CC_LIST=(75 80 86 89 90 120)
          fi

          NVCC_FLAGS=(-O3 -rdc true -std=c++17)
          if [[ "${CUDA_MAJOR}.${CUDA_MINOR}" == "12.2" ]]; then
            NVCC_FLAGS+=(-ccbin g++-12)
          fi

          BUILD_JOBS="$(python -c 'import os; print(os.cpu_count() or 2)')"
          for cc in "${CC_LIST[@]}"; do
            make -j "${BUILD_JOBS}" GPU_CC="${cc}" NVCC_FLAGS="${NVCC_FLAGS[*]}"
            mkdir -p "cu${CUDA_MAJOR}_cc${cc}"
            mv *.cubin *.fatbin *.ptx *.o *.a *.ltoir "cu${CUDA_MAJOR}_cc${cc}"
          done
          popd

          if [[ "${{ inputs.host-platform }}" == linux* ]]; then
            "${SCCACHE_PATH}" --show-adv-stats
            "${SCCACHE_PATH}" --show-stats --stats-format=json > "${GITHUB_WORKSPACE}/sccache_test_artifacts_${CUDA_ARTIFACT_SUFFIX}.json"
          fi

      - name: Report sccache stats (test artifacts ${{ env.CUDA_ARTIFACT_SUFFIX }})
        uses: ./.github/actions/sccache-summary
        with:
          json-file: sccache_test_artifacts_${{ env.CUDA_ARTIFACT_SUFFIX }}.json
          label: "test artifacts (CUDA ${{ matrix.cuda-version }})"
          build-step: "Build cuda-lang-numba-compat test artifacts against CUDA ${{ matrix.cuda-version }}"

      - name: Upload cuda-lang-numba-compat test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ env.CL_NUMBA_COMPAT_CUDA_TEST_ARTIFACT_NAME }}-${{ env.CUDA_ARTIFACT_SUFFIX }}
          path: tests/numba_cuda_tests/testing/cu*
          if-no-files-found: error
