on:
  workflow_call:
    inputs:
      host-platform:
        required: true
        type: string
      cuda-version:
        required: true
        type: string
      prev-cuda-version:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

permissions:
  contents: read  # This is required for actions/checkout

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          # - "3.14t"
    name: py${{ matrix.python-version }}
    runs-on: ${{ (inputs.host-platform == 'linux-64' && 'linux-amd64-cpu8') ||
                 (inputs.host-platform == 'linux-aarch64' && 'linux-arm64-cpu8') ||
                 (inputs.host-platform == 'win-64' && 'windows-2022') }}
    container:
      image: ${{ (inputs.host-platform == 'linux-aarch64' && 'quay.io/pypa/manylinux_2_28_aarch64') ||
                 (inputs.host-platform == 'linux-64' && 'quay.io/pypa/manylinux_2_28_x86_64') || '' }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Select manylinux Python interpreter
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          PY_VER_FMT=$(echo "${{ matrix.python-version }}" | tr -d '.')
          PY_BIN="/opt/python/cp${PY_VER_FMT}-cp${PY_VER_FMT}/bin"
          echo "${PY_BIN}" >> "$GITHUB_PATH"
          echo "PY=${PY_BIN}/python" >> "$GITHUB_ENV"

      - name: Install latest rapidsai/sccache
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          curl -fsSL "https://github.com/rapidsai/sccache/releases/latest/download/sccache-$(uname -m)-unknown-linux-musl.tar.gz" \
            | tar -C /usr/local/bin -xz --strip-components=1 --wildcards '*/sccache'
          sccache --version
          echo "SCCACHE_PATH=/usr/local/bin/sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_USE_PREPROCESSOR_CACHE_MODE=true" >> "$GITHUB_ENV"

      # xref: https://github.com/orgs/community/discussions/42856#discussioncomment-7678867
      - name: Adding addtional GHA cache-related env vars
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_SERVICE_V2', 'on');
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'] || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_URL', process.env['ACTIONS_RUNTIME_URL'] || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'] || '');

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        if: ${{ inputs.host-platform != 'win-64' }}
        with:
          enable-apt: true

      - name: Set up Python (Windows)
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up MSVC
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1

      - name: Set environment variables
        env:
          HOST_PLATFORM: ${{ inputs.host-platform }}
          PY_VER: ${{ matrix.python-version }}
          SHA: ${{ github.sha }}
        run: ./ci/tools/env-vars build

      - name: Dump environment
        run: |
          env

      - name: Download LLVM Modern artifacts
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: llvm-modern-install-${{ inputs.host-platform }}
          path: llvm-modern-install

      - name: Download LLVM 7 artifacts
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: llvm7-install-${{ inputs.host-platform }}
          path: llvm7-install

      - name: Fix LLVM artifact permissions
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          chmod -R +x llvm-modern-install/bin/ llvm7-install/bin/ || true
          chmod -R +x llvm-modern-install/lib/ llvm7-install/lib/ || true

      - name: Set LLVM environment variables
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          echo "MLIR_DIR=$(pwd)/llvm-modern-install/lib/cmake/mlir" >> "$GITHUB_ENV"
          echo "LIBLLVM7=$(pwd)/llvm7-install/lib/libLLVM-7.so" >> "$GITHUB_ENV"

      - name: Build cuda-lang-numba-compat wheel (Linux)
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        env:
          CC: "sccache cc"
          CXX: "sccache c++"
          SCCACHE_GHA_ENABLED: "true"
        run: |
          export Python3_EXECUTABLE="$(which python)"
          export Python_ROOT_DIR="$(python -c 'import sys; print(sys.prefix)')"
          pip wheel . --no-deps -v --wheel-dir dist/

      - name: Build cuda-lang-numba-compat wheel (Windows)
        if: ${{ startsWith(inputs.host-platform, 'win') }}
        run: |
          pip wheel . --no-deps -v --wheel-dir dist/

      - name: Repair wheel with auditwheel
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          pip install auditwheel
          mkdir -p dist-repaired
          auditwheel -v repair dist/*.whl --wheel-dir dist-repaired/ \
            --exclude libMLIRPythonCAPI.so \
            --exclude libMLIRPythonSupport-cusimt.so \
            --exclude libLLVM-7.so
          rm -rf dist/
          mv dist-repaired dist/

      - name: sccache stats
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        run: |
          sccache --show-adv-stats
          sccache --show-stats --stats-format=json > sccache_cl_numba_compat.json

      - name: Report sccache stats (cuda-lang-numba-compat)
        if: ${{ startsWith(inputs.host-platform, 'linux') }}
        uses: ./.github/actions/sccache-summary
        with:
          json-file: sccache_cl_numba_compat.json
          label: "cuda-lang-numba-compat"
          build-step: "Build cuda-lang-numba-compat wheel (Linux)"

      - name: List the cuda-lang-numba-compat artifacts directory
        run: |
          ls -lahR dist/

      - name: Upload cuda-lang-numba-compat build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.CL_NUMBA_COMPAT_CUDA_ARTIFACT_NAME }}
          path: dist/*.whl
          if-no-files-found: error

