name: Publish packages

on:
  workflow_dispatch:
    inputs:
      git-tag:
        description: "The release git tag"
        required: true
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.git-tag || github.ref }}-release
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ inputs.git-tag || github.ref_name }}

jobs:
  ci-vars:
    runs-on: ubuntu-latest
    outputs:
      CUDA_BUILD_VER: ${{ steps.get-vars.outputs.cuda_build_ver }}
      CUDA_PREV_BUILD_VER: ${{ steps.get-vars.outputs.cuda_prev_build_ver }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Get CUDA build versions
        id: get-vars
        run: |
          cuda_build_ver=$(yq '.cuda.build.version' ci/versions.yml)
          echo "cuda_build_ver=$cuda_build_ver" >> $GITHUB_OUTPUT
          cuda_prev_build_ver=$(yq '.cuda.prev_build.version' ci/versions.yml)
          echo "cuda_prev_build_ver=$cuda_prev_build_ver" >> $GITHUB_OUTPUT

  build-llvm-linux-64:
    uses: ./.github/workflows/build-llvm.yml
    with:
      host-platform: linux-64
      source-ref: ${{ inputs.git-tag || github.ref }}
    secrets: inherit

  build-llvm-linux-aarch64:
    uses: ./.github/workflows/build-llvm.yml
    with:
      host-platform: linux-aarch64
      source-ref: ${{ inputs.git-tag || github.ref }}
    secrets: inherit

  build-llvm-windows:
    uses: ./.github/workflows/build-llvm.yml
    with:
      host-platform: win-64
      source-ref: ${{ inputs.git-tag || github.ref }}
    secrets: inherit

  build-wheels-linux-64:
    needs:
      - ci-vars
      - build-llvm-linux-64
    name: Build linux-64
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: linux-64
      cuda-version: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      prev-cuda-version: ${{ needs.ci-vars.outputs.CUDA_PREV_BUILD_VER }}
      source-ref: ${{ inputs.git-tag || github.ref }}

  build-wheels-linux-aarch64:
    needs:
      - ci-vars
      - build-llvm-linux-aarch64
    name: Build linux-aarch64
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: linux-aarch64
      cuda-version: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      prev-cuda-version: ${{ needs.ci-vars.outputs.CUDA_PREV_BUILD_VER }}
      source-ref: ${{ inputs.git-tag || github.ref }}

  build-wheels-windows:
    needs:
      - ci-vars
      - build-llvm-windows
    name: Build win-64
    uses: ./.github/workflows/build-wheel.yml
    with:
      host-platform: win-64
      cuda-version: ${{ needs.ci-vars.outputs.CUDA_BUILD_VER }}
      prev-cuda-version: ${{ needs.ci-vars.outputs.CUDA_PREV_BUILD_VER }}
      source-ref: ${{ inputs.git-tag || github.ref }}

  publish-wheels:
    name: Publish wheels to PyPI
    needs: [build-wheels-linux-64, build-wheels-linux-aarch64, build-wheels-windows]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: numba-cuda-mlir-python*
          path: dist/
          merge-multiple: true
      - name: Display structure of downloaded files
        run: ls -R dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  upload-release:
    name: Upload wheels to GitHub Release
    needs: [build-wheels-linux-64, build-wheels-linux-aarch64, build-wheels-windows]
    if: ${{ !github.event.repository.fork }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: numba-cuda-mlir-python*
          path: wheels/
          merge-multiple: true

      - name: Create GitHub Release if not exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if release already exists, create if not
          if ! gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Creating release ${RELEASE_TAG}"
            gh release create "${RELEASE_TAG}" \
              --repo "${{ github.repository }}" \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --verify-tag
          else
            echo "Release ${RELEASE_TAG} already exists"
          fi

      - name: Upload wheels to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -d "wheels" && $(ls -A wheels 2>/dev/null | wc -l) -gt 0 ]]; then
            echo "Uploading wheels to release ${RELEASE_TAG}"
            gh release upload --clobber "${RELEASE_TAG}" --repo "${{ github.repository }}" wheels/*
          else
            echo "No wheels found to upload"
            exit 1
          fi

  build-docs:
    needs:
      - build-wheels-linux-64
    if: ${{ github.repository_owner == 'nvidia' }}
    permissions:
      actions: read
      contents: write
      pull-requests: write  # required by build-docs.yml for doc preview comments
    uses: ./.github/workflows/build-docs.yml
    with:
      host-platform: linux-64
      git-tag: ${{ inputs.git-tag || github.ref_name }}
      is-release: true
