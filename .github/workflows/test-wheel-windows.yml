name: "CI: Test wheels (Windows)"

on:
  workflow_call:
    inputs:
      build-type:
        type: string
        required: true
      host-platform:
        type: string
        required: true
      test-script:
        type: string
        default: "run-tests"
      matrix_filter:
        type: string
        default: "."

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

jobs:
  compute-matrix:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ inputs.build-type }}
      ARCH: ${{ (inputs.host-platform == 'win-64' && 'amd64') }}
    outputs:
      MATRIX: ${{ steps.compute-matrix.outputs.MATRIX }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate Test Type
        run: |
          if [[ "$BUILD_TYPE" != "pull-request" ]] && [[ "$BUILD_TYPE" != "nightly" ]] && [[ "$BUILD_TYPE" != "branch" ]]; then
              echo "Invalid build type! Must be one of 'nightly', 'pull-request', or 'branch'."
              exit 1
          fi

      - name: Compute Python Test Matrix
        id: compute-matrix
        run: |
          MATRIX_TYPE="${BUILD_TYPE}"
          if [[ "${MATRIX_TYPE}" == "branch" ]]; then
            MATRIX_TYPE="nightly"
          fi

          TEST_MATRIX=$(yq -o json ".windows[\"${MATRIX_TYPE}\"] | map(select(.ARCH == \"${ARCH}\"))" ci/test-matrix.yml)
          MATRIX=$(echo "$TEST_MATRIX" | jq -c '${{ inputs.matrix_filter }} | if (. | length) > 0 then {include: .} else "Error: Empty matrix\n" | halt_error(1) end')

          echo "MATRIX=${MATRIX}" | tee --append "${GITHUB_OUTPUT}"

  test:
    name: py${{ matrix.PY_VER }}, ${{ matrix.CUDA_VER }}, ${{ (matrix.LOCAL_CTK == '1' && 'local') || 'wheels' }}, ${{ matrix.GPU }} (${{ matrix.DRIVER_MODE }})
    needs: compute-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.MATRIX) }}
    runs-on: "windows-${{ matrix.ARCH }}-gpu-${{ matrix.GPU }}-${{ matrix.DRIVER }}-${{ matrix.GPU_COUNT }}"
    if: ${{ github.repository_owner == 'nvidia' && !cancelled() }}
    steps:
      - name: Ensure GPU is working
        run: nvidia-smi

      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set environment variables
        env:
          CUDA_VER: ${{ matrix.CUDA_VER }}
          HOST_PLATFORM: ${{ inputs.host-platform }}
          LOCAL_CTK: ${{ matrix.LOCAL_CTK }}
          PY_VER: ${{ matrix.PY_VER }}
          SHA: ${{ github.sha }}
        run: ./ci/tools/env-vars test

      - name: Download numba-cuda-mlir build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ env.NUMBA_CUDA_MLIR_CUDA_ARTIFACT_NAME }}
          path: dist

      - name: Display structure of downloaded numba-cuda-mlir artifacts
        run: ls -lahR "$NUMBA_CUDA_MLIR_CUDA_ARTIFACTS_DIR"

      - name: Determine LLVM Python tag
        run: |
          PY_VER_FMT=$(echo "${{ matrix.PY_VER }}" | tr -d '.')
          echo "LLVM_PY_TAG=cp${PY_VER_FMT}" >> "$GITHUB_ENV"

      - name: Compute LLVM cache keys
        id: llvm-cache-keys
        run: |
          source ci/llvm-version.env
          SCRIPT_HASH=$(sha256sum ci/build-windows.sh | cut -c1-12)
          MODERN_VERSION_SHORT=$(echo "$LLVM_MODERN_COMMIT" | cut -c1-12)
          LLVM7_VERSION_SHORT=$(echo "$LLVM7_TAG" | cut -c1-12)
          echo "llvm-modern-key=llvm-modern-windows-amd64-${LLVM_PY_TAG}-${MODERN_VERSION_SHORT}-${SCRIPT_HASH}" >> "$GITHUB_OUTPUT"
          echo "llvm7-key=llvm7-windows-amd64-${LLVM7_VERSION_SHORT}-${SCRIPT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore LLVM Modern from cache
        id: llvm-modern-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm-modern-install/
          key: ${{ steps.llvm-cache-keys.outputs.llvm-modern-key }}

      - name: Download LLVM Modern artifacts
        if: steps.llvm-modern-cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: llvm-modern-install-${{ env.LLVM_PY_TAG }}-${{ inputs.host-platform }}
          path: llvm-modern-install

      - name: Restore LLVM 7 from cache
        id: llvm7-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: llvm7-install/
          key: ${{ steps.llvm-cache-keys.outputs.llvm7-key }}

      - name: Download LLVM 7 artifacts
        if: steps.llvm7-cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: llvm7-install-${{ inputs.host-platform }}
          path: llvm7-install

      - name: Add LLVM DLL directories to PATH
        run: |
          {
            echo "$(cygpath -w "$(pwd)/llvm-modern-install/bin")"
            echo "$(cygpath -w "$(pwd)/llvm-modern-install/lib")"
            echo "$(cygpath -w "$(pwd)/llvm7-install/bin")"
            echo "$(cygpath -w "$(pwd)/llvm7-install/lib")"
          } >> "$GITHUB_PATH"

      - name: Set up Python ${{ matrix.PY_VER }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.PY_VER }}

      - name: Set up mini CTK
        if: ${{ matrix.LOCAL_CTK == '1' }}
        uses: ./.github/actions/fetch_ctk
        continue-on-error: false
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: ${{ matrix.CUDA_VER }}
          cuda-components: "cuda_nvcc,cuda_cudart,cuda_crt,libnvvm,cuda_nvrtc,cuda_cccl,libnvjitlink,cuda_cuobjdump"

      - name: Run numba-cuda-mlir tests
        env:
          CUDA_VER: ${{ matrix.CUDA_VER }}
          LOCAL_CTK: ${{ matrix.LOCAL_CTK }}
          TEST_SCRIPT: ${{ inputs.test-script }}
        run: |
          if [[ "${LOCAL_CTK}" != 1 ]]; then
            export NUMBA_CUDA_MLIR_TEST_WHEEL_ONLY=1
            export NUMBA_CUDA_MLIR_CUDA_TEST_WHEEL_ONLY=1
            export NUMBA_CUDA_TEST_WHEEL_ONLY=1
          fi
          case "${TEST_SCRIPT}" in
            run-tests|run-coverage-tests) ;;
            *) echo "Unsupported test script: ${TEST_SCRIPT}"; exit 1 ;;
          esac
          "${TEST_SCRIPT}"
