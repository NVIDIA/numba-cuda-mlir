name: "CI: Test wheels (Windows)"

on:
  workflow_call:
    inputs:
      build-type:
        type: string
        required: true
      host-platform:
        type: string
        required: true
      test-script:
        type: string
        default: "run-tests"
      matrix_filter:
        type: string
        default: "."

defaults:
  run:
    shell: bash --noprofile --norc -xeuo pipefail {0}

jobs:
  compute-matrix:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ inputs.build-type }}
      ARCH: ${{ (inputs.host-platform == 'win-64' && 'amd64') }}
    outputs:
      MATRIX: ${{ steps.compute-matrix.outputs.MATRIX }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate Test Type
        run: |
          if [[ "$BUILD_TYPE" != "pull-request" ]] && [[ "$BUILD_TYPE" != "nightly" ]] && [[ "$BUILD_TYPE" != "branch" ]]; then
              echo "Invalid build type! Must be one of 'nightly', 'pull-request', or 'branch'."
              exit 1
          fi

      - name: Compute Python Test Matrix
        id: compute-matrix
        run: |
          MATRIX_TYPE="${BUILD_TYPE}"
          if [[ "${MATRIX_TYPE}" == "branch" ]]; then
            MATRIX_TYPE="nightly"
          fi

          TEST_MATRIX=$(yq -o json ".windows[\"${MATRIX_TYPE}\"] | map(select(.ARCH == \"${ARCH}\"))" ci/test-matrix.yml)
          MATRIX=$(echo "$TEST_MATRIX" | jq -c '${{ inputs.matrix_filter }} | if (. | length) > 0 then {include: .} else "Error: Empty matrix\n" | halt_error(1) end')

          echo "MATRIX=${MATRIX}" | tee --append "${GITHUB_OUTPUT}"

  test:
    name: py${{ matrix.PY_VER }}, ${{ matrix.CUDA_VER }}, ${{ (matrix.LOCAL_CTK == '1' && 'local') || 'wheels' }}, ${{ matrix.GPU }} (${{ matrix.DRIVER_MODE }})
    needs: compute-matrix
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.MATRIX) }}
    runs-on: "windows-${{ matrix.ARCH }}-gpu-${{ matrix.GPU }}-${{ matrix.DRIVER }}-${{ matrix.GPU_COUNT }}"
    if: ${{ github.repository_owner == 'nvidia' && !cancelled() }}
    steps:
      - name: Checkout ${{ github.event.repository.name }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main
        continue-on-error: true
        with:
          enable-apt: true

      - name: Update driver
        shell: pwsh
        env:
          DRIVER_MODE: ${{ matrix.DRIVER_MODE }}
          GPU_TYPE: ${{ matrix.GPU }}
        run: |
          ci/tools/install_gpu_driver.ps1

      - name: Ensure GPU is working
        shell: pwsh
        run: |
          nvidia-smi

          $mode_output = nvidia-smi | Select-String -Pattern "${{ matrix.DRIVER_MODE }}"
          Write-Output "Driver mode check: $mode_output"
          if ("$mode_output" -eq "") {
            Write-Error "Switching to driver mode ${{ matrix.DRIVER_MODE }} failed!"
            exit 1
          }
          Write-Output "Driver mode verified: ${{ matrix.DRIVER_MODE }}"

      - name: Set environment variables
        env:
          CUDA_VER: ${{ matrix.CUDA_VER }}
          HOST_PLATFORM: ${{ inputs.host-platform }}
          LOCAL_CTK: ${{ matrix.LOCAL_CTK }}
          PY_VER: ${{ matrix.PY_VER }}
          SHA: ${{ github.sha }}
        run: ./ci/tools/env-vars test

      - name: Download numba-cuda-mlir build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ env.NUMBA_CUDA_MLIR_CUDA_ARTIFACT_NAME }}
          path: dist

      - name: Display structure of downloaded numba-cuda-mlir artifacts
        run: ls -lahR "$NUMBA_CUDA_MLIR_CUDA_ARTIFACTS_DIR"

      - name: Set up Python ${{ matrix.PY_VER }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.PY_VER }}

      - name: Set up mini CTK
        if: ${{ matrix.LOCAL_CTK == '1' }}
        uses: ./.github/actions/fetch_ctk
        continue-on-error: false
        with:
          host-platform: ${{ inputs.host-platform }}
          cuda-version: ${{ matrix.CUDA_VER }}
          cuda-components: "cuda_nvcc,cuda_cudart,cuda_crt,libnvvm,cuda_nvrtc,cuda_cccl,libnvjitlink,cuda_cuobjdump"

      - name: Install numba-cuda-mlir for diagnostics
        env:
          CUDA_VER: ${{ matrix.CUDA_VER }}
          LOCAL_CTK: ${{ matrix.LOCAL_CTK }}
        run: |
          TEST_CUDA_MAJOR="$(cut -d '.' -f 1 <<< "${CUDA_VER}")"
          wheels=("${NUMBA_CUDA_MLIR_CUDA_ARTIFACTS_DIR}"/*.whl)
          wheel="$(cygpath -w "${wheels[0]}")"
          if [[ "${LOCAL_CTK}" == 1 ]]; then
            pip install --only-binary=:all: "${wheel}"
          else
            pip install --only-binary=:all: "${wheel}[cu${TEST_CUDA_MAJOR}]"
          fi

      - name: Diagnose DLL loading
        continue-on-error: true
        run: |
          python - <<'PY'
          import ctypes
          import importlib.util
          import os
          import pathlib
          import sys

          spec = importlib.util.find_spec("numba_cuda_mlir")
          if spec is None or not spec.submodule_search_locations:
              raise SystemExit("numba_cuda_mlir not installed")
          pkg = pathlib.Path(next(iter(spec.submodule_search_locations)))
          mlir_libs = pkg / "_mlir" / "_mlir_libs"
          pkg_lib = pkg / "lib"

          print(f"pkg:        {pkg}")
          print(f"mlir_libs:  {mlir_libs}")
          print(f"pkg_lib:    {pkg_lib}")
          print()
          print("=== Contents of _mlir_libs/ ===")
          if mlir_libs.is_dir():
              for path in sorted(mlir_libs.iterdir()):
                  if path.is_file() and path.suffix.lower() in {".dll", ".pyd", ".lib"}:
                      print(f"  {path.name}  ({path.stat().st_size} bytes)")
          print()
          print("=== Contents of lib/ ===")
          if pkg_lib.is_dir():
              for path in sorted(pkg_lib.iterdir()):
                  if path.is_file() and path.suffix.lower() in {".dll", ".pyd", ".lib"}:
                      print(f"  {path.name}  ({path.stat().st_size} bytes)")
          print()

          handles = []
          for d in (mlir_libs, pkg, pkg_lib):
              if d.is_dir() and hasattr(os, "add_dll_directory"):
                  handles.append(os.add_dll_directory(str(d)))
                  print(f"add_dll_directory: {d}")
          print()

          py_ver_fmt = f"cp{sys.version_info.major}{sys.version_info.minor}"
          if sys.version_info >= (3, 14) and sys.abiflags == "t":
              py_ver_fmt += "t"

          load_order = [
              mlir_libs / "nanobind-numba_cuda_mlir.dll",
              mlir_libs / "MLIRPythonCAPI.dll",
              mlir_libs / "MLIRPythonSupport-numba_cuda_mlir.dll",
              mlir_libs / "MLIRModernToNVVM.dll",
              mlir_libs / "MLIRToLLVM70.dll",
              pkg_lib / "LLVM-C.dll",
              mlir_libs / f"_mlir.{py_ver_fmt}-win_amd64.pyd",
          ]

          first_fail = None
          for dll in load_order:
              if not dll.is_file():
                  print(f"SKIP    {dll.name}  (not in wheel)")
                  continue
              try:
                  ctypes.WinDLL(str(dll))
              except OSError as e:
                  win_err = ctypes.get_last_error() or "?"
                  print(f"FAIL    {dll.name}  win_err={win_err}  {e}")
                  if first_fail is None:
                      first_fail = (dll, e, win_err)
              else:
                  print(f"OK      {dll.name}")

          print()
          print("=== Attempting Python-level import ===")
          try:
              from numba_cuda_mlir._mlir import ir  # noqa: F401
              print("OK: from numba_cuda_mlir._mlir import ir")
          except BaseException as e:
              print(f"FAIL: {type(e).__name__}: {e}")

          if first_fail is not None:
              dll, err, win_err = first_fail
              print(f"\nFirst failing DLL: {dll.name} (Windows error {win_err}): {err}", file=sys.stderr)
          PY

      - name: Run numba-cuda-mlir tests
        env:
          CUDA_VER: ${{ matrix.CUDA_VER }}
          LOCAL_CTK: ${{ matrix.LOCAL_CTK }}
          TEST_SCRIPT: ${{ inputs.test-script }}
        run: |
          if [[ "${LOCAL_CTK}" != 1 ]]; then
            export NUMBA_CUDA_MLIR_TEST_WHEEL_ONLY=1
            export NUMBA_CUDA_MLIR_CUDA_TEST_WHEEL_ONLY=1
            export NUMBA_CUDA_TEST_WHEEL_ONLY=1
          fi
          case "${TEST_SCRIPT}" in
            run-tests|run-coverage-tests) ;;
            *) echo "Unsupported test script: ${TEST_SCRIPT}"; exit 1 ;;
          esac
          "${TEST_SCRIPT}"
